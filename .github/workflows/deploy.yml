name: Deploy NSD Documentation
on:
  push:
    branches: ["master"] # Triggers when you push to master
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Deploys your root folder containing the .md files
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: Normative Stress Dynamics
first_name: Juho
middle_name: E.A.
last_name: Paajanen

contact_note: >
  You can even add a little note about which of these is the best way to reach you.
description: > 
  A Unified Thermodynamic Theory of Systemic Stability and Collapse.
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
keywords: normative stress dynamics, complex systems, thermodynamics, self-organized criticality, network theory
lang: en 
icon: ⚛️ 

# -----------------------------------------------------------------------------
# URLs and Paths (Critical for CSS & Deployment)
# -----------------------------------------------------------------------------

url: "https://j-e-a-p.github.io"
baseurl: "/NSD" 
last_updated: false 
impressum_path: 
back_to_top: true

# -----------------------------------------------------------------------------
# Math Rendering (Required for Dynamical Laws and Theorems)
# -----------------------------------------------------------------------------
markdown: kramdown
kramdown:
  math_engine: mathjax
enable_math: true

# -----------------------------------------------------------------------------
# Plugins and Exclusions
# -----------------------------------------------------------------------------
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-seo-tag

exclude:
  - .venv/
  - .github/
  - Gemfile.lock

# -----------------------------------------------------------------------------
# Collections (Forces Jekyll to read the _pages folder)
# -----------------------------------------------------------------------------
collections:
  pages:
    output: true
    permalink: /:title/

# -----------------------------------------------------------------------------
# Theme & SASS (Restores the CSS styling)
# -----------------------------------------------------------------------------
sass:
  sass_dir: _sass
  style: compressed